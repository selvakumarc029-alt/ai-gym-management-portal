<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You | AI Gym</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="auth.css?v=14">
  <link rel="stylesheet" href="thank-you.css?v=1">
</head>
<body class="thank-you-page">
  <main class="auth-shell">
    <section class="auth-card register-card" aria-labelledby="thank-you-title">
      <div class="auth-panel">
        <a class="mini-logo project-logo" href="index.html" aria-label="AI GYM home"><img src="assets/ai-gym-logo-4k.png" alt="AI GYM"></a>
        <div class="auth-copy">
          <section class="trial-thank-you" aria-live="polite">
            <span aria-hidden="true">✓</span>
            <h1 id="thank-you-title">Thank you!</h1>
            <p id="thankYouMessage">Your subscription request has been received.</p>
            <p><strong id="thankYouDetail">We're excited to help you grow your fitness business.</strong></p>
            <a id="thankYouAction" href="index.html">Return to home</a>
          </section>
        </div>
      </div>
      <div class="auth-illustration" aria-hidden="true"></div>
    </section>
  </main>
  <script src="thank-you.js?v=1"></script>
</body>
</html>
